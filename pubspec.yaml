name: beraka_hotel_restaurant

description: Application de gestion d'hôtel restaurant en Flutter.

publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Packages
  intl: ^0.20.2
  flutter_map: ^8.2.1
  latlong2: ^0.9.1
  url_launcher: ^6.3.1
  supabase_flutter: ^1.6.0
  file_picker: ^11.0.2
  flutter_animate: ^4.5.2
  font_awesome_flutter: ^10.8.0
  http: ^1.5.2
  loading_animation_widget: ^1.3.0
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - flutter_01.png
    - flutter_02.png
dependency_overrides:
  sign_in_with_apple: ^8.1.0